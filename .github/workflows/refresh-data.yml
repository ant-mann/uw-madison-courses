name: Refresh course data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Extract course data
        run: pnpm run extract:fall-2026 -- --headless --include-packages

      - name: Build course database
        run: pnpm run build:course-db

      - name: Publish to Supabase
        run: pnpm run publish:course-db:postgres
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          SQLITE_BATCH_SIZE: "250"
