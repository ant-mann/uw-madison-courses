name: Refresh course data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Extract course data
        run: pnpm run extract:fall-2026 -- --headless --include-packages

      - name: Build course database
        run: pnpm run build:course-db

      - name: Publish to Supabase
        run: |
          set -o pipefail
          max_attempts=3
          base_backoff_seconds=15

          for attempt in $(seq 1 "$max_attempts"); do
            if pnpm run publish:course-db:postgres 2>&1 | tee /tmp/publish-course-db.log; then
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              exit 1
            fi

            if ! grep -q 'ECHECKOUTTIMEOUT' /tmp/publish-course-db.log; then
              exit 1
            fi

            sleep $((attempt * base_backoff_seconds))
          done
        env:
          SUPABASE_DIRECT_DATABASE_URL: ${{ secrets.SUPABASE_DIRECT_DATABASE_URL }}
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          SQLITE_BATCH_SIZE: "100"
